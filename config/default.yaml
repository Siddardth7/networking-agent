# Networking Agent — Default Configuration
# Copy to ~/.networking-agent/config.yaml and fill in real values.
# Run: chmod 600 ~/.networking-agent/config.yaml

keys:
  anthropic_api_key: "REPLACE_ME"
  serper_api_key: "REPLACE_ME"
  hunter_api_key: "REPLACE_ME"

providers:
  serper_monthly_limit: 100   # free tier
  hunter_monthly_limit: 25    # free tier

pipeline:
  finder_limit: 5             # contacts discovered per company

quality:
  linkedin_char_limit: 200    # LinkedIn free-account connection-note cap
  email_word_limit: 150       # cold-email body word cap
  batch_hard_fail_threshold: 0.0  # warn if HARD_FAIL fraction exceeds this
  enable_critic: true         # Layer 4 automated critic pass
  opener_max_repeats: 2       # max contacts per run sharing the same opener
